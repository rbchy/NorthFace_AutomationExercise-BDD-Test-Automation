# ===== Applications under test =====
# North Face production site (bot-protected -> smoke/homepage flows only).
base.url=https://www.thenorthface.com/
# Automation-friendly demo shop (full search/cart/checkout E2E).
demo.url=https://automationexercise.com/

# ===== Browser settings =====
# Supported: chrome (default). Extend DriverManager for others.
browser=chrome
# Run without a visible window (useful for CI). true / false
headless=false

# ===== Timeouts (seconds) =====
implicit.wait=10
explicit.wait=20
page.load.timeout=40

# ===== Performance smoke =====
# Max acceptable full page-load time for the demo shop (milliseconds).
perf.budget.ms=20000
